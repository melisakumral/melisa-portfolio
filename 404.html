<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sayfa Bulunamadı — Melisa</title>
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .notfound {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
    position: relative;
  }
  .notfound-code {
    font-family: var(--font-heading);
    font-size: clamp(4rem, 14vw, 8rem);
    font-weight: 700;
    color: var(--bordeaux);
    line-height: 1;
    margin-bottom: 8px;
  }
  .notfound-code span { color: var(--gold); }
  .notfound-title {
    font-family: var(--font-heading);
    font-size: clamp(1.3rem, 3vw, 1.8rem);
    color: var(--text-main);
    margin-bottom: 14px;
  }
  .notfound-desc {
    color: var(--text-dim);
    max-width: 420px;
    margin-bottom: 32px;
  }
</style>
</head>
<body>

<div class="bg-blocks" aria-hidden="true">
  <div class="block block-1"></div>
  <div class="block block-2"></div>
  <div class="block block-3"></div>
  <div class="block block-4"></div>
</div>

<main class="notfound">
  <p class="notfound-code">4<span>0</span>4</p>
  <h1 class="notfound-title">Sayfa Bulunamadı</h1>
  <p class="notfound-desc">Aradığınız sayfa taşınmış veya hiç var olmamış olabilir. Ana sayfaya dönüp tekrar deneyebilirsiniz.</p>
  <a href="/" class="btn btn-primary">← Ana Sayfaya Dön</a>
</main>

</body>
</html>
